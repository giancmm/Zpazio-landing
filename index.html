<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zpazio</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <div class="overlay"></div>

  <header>
    <img src="logo_zpazio_blanco_1.png" alt="Zpazio Logo" class="logo" />
    <div class="menu-toggle" id="menu-toggle">&#9776;</div>
    <nav id="menu" class="hidden">
      <ul>
        <li><a href="#">NOSOTROS</a></li>
        <li><a href="#">MARCAS</a></li>
        <li><a href="#">EQUIPO</a></li>
        <li><a href="#">CONTACTO</a></li>
      </ul>
    </nav>
  </header>

  <!-- Mata cualquier rastro del antiguo #cursor-effect por si está cacheado -->
  <script>
    (function killLegacyCursor(){
      function nuke(){
        const old = document.getElementById('cursor-effect');
        if (old) old.remove();
      }
      nuke();
      const mo = new MutationObserver(nuke);
      mo.observe(document.documentElement, {childList:true, subtree:true});
      window.addEventListener('unload', ()=>mo.disconnect());
    })();

    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('menu').classList.toggle('hidden');
    });
  </script>

  <script defer src="overlay.js?v=4"></script>
</body>
</html>

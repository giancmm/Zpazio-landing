
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zpazio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            animation: ripple-animation 1s linear;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header img {
            height: 50px;
        }

        .menu-toggle {
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-toggle span {
            height: 4px;
            background: white;
            border-radius: 2px;
        }

        nav {
            display: none;
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(100, 100, 100, 0.95);
            width: 200px;
            height: 100%;
            padding: 60px 20px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
        }

        nav a {
            display: block;
            color: white;
            margin: 20px 0;
            text-decoration: none;
            font-size: 18px;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
        }

        .content h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <video autoplay muted loop id="background-video">
        <source src="https://www.youtube.com/embed/9byz0E_l0u0" type="video/mp4">
    </video>

    <header>
        <img src="logo_zpazio_blanco_1.png" alt="Zpazio Logo">
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav id="menu">
        <a href="#">NOSOTROS</a>
        <a href="#">MARCAS</a>
        <a href="#">EQUIPO</a>
        <a href="#">CONTACTO</a>
    </nav>

    <div class="content">
        <h1>Zpazio</h1>
        <p>Creamos atmósferas de alto diseño con marcas como Flos, Vibia, Lutron, Terzani y más.</p>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('mousemove', function(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            ripple.style.width = ripple.style.height = '20px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1000);
        });
    </script>
</body>
</html>

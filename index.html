<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zpazio</title>
  <link rel="stylesheet" href="styles.css?v=7"/>
</head>
<body>
  <!-- Canvas que pinta la IMAGEN DE FONDO y aplica la onda -->
  <canvas id="bgCanvas"></canvas>

  <!-- Overlay de degradado para mejorar legibilidad -->
  <div class="bg-gradient-overlay" aria-hidden="true"></div>

  <header>
    <img src="logo_zpazio_blanco_1.png" alt="Zpazio Logo" class="logo"/>
    <!-- Botón hamburguesa (abre el panel) -->
    <div class="menu-toggle" id="menu-toggle" aria-label="Abrir menú" aria-expanded="false">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </div>
    <!-- Panel off-canvas (sin class hidden) -->
    <nav id="menu">
      <div class="menu-header">
        <button class="menu-close" id="menu-close" aria-label="Cerrar menú">✕</button>
      </div>
      <ul>
        <li><a href="#">NOSOTROS</a></li>
        <li><a href="#">MARCAS</a></li>
        <li><a href="#">EQUIPO</a></li>
        <li><a href="#">CONTACTO</a></li>
      </ul>
    </nav>
  </header>

  <!-- Scrim para foco y cierre -->
  <div class="menu-scrim" id="menu-scrim" aria-hidden="true"></div>

  <!-- Bombilla que sigue al cursor -->
  <div class="cursor-bulb" id="cursor-bulb">
    <img src="bombilla.svg" alt="bulb"/>
  </div>

  <script defer src="overlay.js?v=7"></script>
</body>
</html>

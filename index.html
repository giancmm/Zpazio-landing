
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zpazio — Iluminación de Lujo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; overflow: hidden; }
  </style>
</head>
<body class="h-screen overflow-hidden flex justify-center items-center">
  <div class="h-screen w-full relative">
    <canvas id="rippleCanvas" class="fixed top-0 left-0 w-full h-full z-0 pointer-events-none"></canvas>
    <header class="relative z-10 flex justify-between items-center p-6 border-b border-gray-800">
      <h1 class="text-3xl font-light">Zpazio</h1>
      <nav class="space-x-6 text-sm uppercase tracking-wider">
        <a href="#nosotros" class="hover:text-gray-400">Nosotros</a>
        <a href="#marcas" class="hover:text-gray-400">Marcas</a>
        <a href="#proyectos" class="hover:text-gray-400">Proyectos</a>
        <a href="#contacto" class="hover:text-gray-400">Contacto</a>
      </nav>
    </header>
    <section class="relative z-10 h-full bg-cover bg-center flex items-center justify-center" style="background-image: url('https://images.unsplash.com/photo-1505692794403-34d4982d5b69');">
      <div class="bg-black bg-opacity-60 p-10 rounded-xl text-center">
        <h2 class="text-5xl font-light mb-4">Iluminación como experiencia</h2>
        <p class="text-gray-300 text-lg max-w-xl mx-auto">Creamos atmósferas de alto diseño con marcas como Flos, Vibia, Lutron, Terzani y más.</p>
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('rippleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    let ripples = [];
    window.addEventListener('mousemove', e => ripples.push({ x: e.clientX, y: e.clientY, radius: 0, alpha: 1 }));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ripples.forEach((ripple, i) => {
        ripple.radius += 2;
        ripple.alpha -= 0.02;
        if (ripple.alpha <= 0) ripples.splice(i, 1);
        else {
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 255, 255, ${ripple.alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>


<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zpazio — Iluminación de Lujo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    #rippleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body class="flex justify-center items-center bg-black text-white font-sans relative">

  <!-- Ripple Canvas -->
  <canvas id="rippleCanvas" class="w-full h-full"></canvas>

  <!-- Contenido -->
  <div class="z-10 text-center px-6">
    <h1 class="text-5xl font-light mb-4">Zpazio</h1>
    <p class="text-gray-300 text-lg max-w-xl mx-auto">
      Creamos atmósferas de alto diseño con marcas como Flos, Vibia, Lutron, Terzani y más.
    </p>
  </div>

  <!-- JS Ripple Effect -->
  <script>
    const canvas = document.getElementById('rippleCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    let ripples = [];

    window.addEventListener('mousemove', (e) => {
      ripples.push({
        x: e.clientX,
        y: e.clientY,
        radius: 0,
        alpha: 1
      });
    });

    function animate() {
      ctx.clearRect(0, 0, width, height);
      ripples.forEach((r, i) => {
        r.radius += 2;
        r.alpha -= 0.02;
        if (r.alpha <= 0) {
          ripples.splice(i, 1);
        } else {
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 255, 255, ${r.alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      });
      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>


<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zpazio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', sans-serif;
      color: white;
    }
    body {
      position: relative;
    }
    video#bg-video {
      position: absolute;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    header {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    header img {
      height: 50px;
    }
    .menu-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 30px;
      height: 20px;
      cursor: pointer;
    }
    .menu-btn div {
      height: 3px;
      background: white;
      margin: 5px 0;
      transition: 0.3s;
    }
    .menu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100%;
      background-color: rgba(200, 200, 200, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: right 0.4s ease;
      z-index: 2;
    }
    .menu a {
      color: black;
      text-decoration: none;
      font-size: 1.5rem;
      margin: 15px 0;
    }
    .menu.open {
      right: 0;
    }
    main {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }
    main h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    main p {
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <video autoplay muted loop id="bg-video">
    <source src="Bellhop Matte Black.mp4" type="video/mp4">
    Tu navegador no soporta video en HTML5.
  </video>

  <header>
    <img src="logo_zpazio_blanco_1.png" alt="Zpazio Logo" />
  </header>

  <div class="menu-btn" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="menu" id="menu">
    <a href="#">Nosotros</a>
    <a href="#">Marcas</a>
    <a href="#">Equipo</a>
    <a href="#">Contacto</a>
  </div>

  <main>
    <div>
      <h1>Zpazio</h1>
      <p>Creamos atmósferas de alto diseño con marcas como Flos, Vibia, Lutron, Terzani y más.</p>
    </div>
  </main>

  <script>
    function toggleMenu() {
      document.getElementById('menu').classList.toggle('open');
    }
  </script>
</body>
</html>

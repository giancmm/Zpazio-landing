<!DOCTYPE html>
<html lang="es">
<head>

    <div class="menu-toggle" id="menu-toggle">&#9776;</div>
    <nav id="menu" class="hidden">

  <!-- Bloque superior VERTICAL estilo 5Sólidos (a la derecha del logo) -->

    <a href="#nosotros">Nosotros</a>
    <a href="#equipo">Equipo</a>
    <a href="#contacto">Contacto</a>

  <!-- Cursor bombilla -->
  <div class="cursor-bulb" id="cursor-bulb">
    <img src="bombilla.svg" alt="bulb"/>
  </div>

  <script defer src="overlay.js?v=9"></script>


<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zpazio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="video-background">
    <iframe 
      src="https://www.youtube.com/embed/9byz0E_l0u0?autoplay=1&mute=1&controls=0&loop=1&playlist=9byz0E_l0u0&modestbranding=1&showinfo=0" 
      frameborder="0" 
      allow="autoplay" 
      allowfullscreen
      class="video-iframe">
    </iframe>
  </div>

  <header class="banner">
    <img src="logo_zpazio_blanco_1.png" alt="Zpazio Logo" class="logo">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </header>

  <div class="menu" id="menu">
    <ul>
      <li><a href="#">NOSOTROS</a></li>
      <li><a href="#">MARCAS</a></li>
      <li><a href="#">EQUIPO</a></li>
      <li><a href="#">CONTACTO</a></li>
    </ul>
  </div>

  <main class="content">
    <h1>Zpazio</h1>
    <p>Creamos atmósferas de alto diseño con marcas como Flos, Vibia, Lutron, Terzani y más.</p>
  </main>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.classList.toggle("open");
    }
  </script>
</body>
</html>
